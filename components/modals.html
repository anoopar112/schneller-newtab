<div
  x-show="isGroupModalOpen"
  style="display: none"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  x-transition.opacity.duration.300ms
>
  <div
    @click.away="isGroupModalOpen = false"
    class="bg-primary border border-tertiary p-8 rounded-2xl shadow-2xl w-full max-w-sm"
    x-transition.scale.origin.bottom.duration.300ms
  >
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-medium text-accent">Create New Group</h3>
      <button
        @click="isGroupModalOpen = false"
        class="text-tertiary hover:text-accent transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-accent/80 mb-1"
          >Group Name</label
        >
        <input
          x-model="newGroupName"
          type="text"
          placeholder="e.g. Social Media"
          class="w-full bg-secondary border border-tertiary rounded-lg px-4 py-2 text-accent placeholder-accent/40 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all"
        />
      </div>
      <button
        @click="saveGroup()"
        class="w-full mt-4 bg-accent hover:bg-accent/80 text-primary font-bold py-2.5 rounded-lg transition-colors shadow-md shadow-black/20"
      >
        Save Group
      </button>
    </div>
  </div>
</div>

<div
  x-show="isLinkModalOpen"
  style="display: none"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  x-transition.opacity.duration.300ms
>
  <div
    @click.away="isLinkModalOpen = false"
    class="bg-primary border border-tertiary p-8 rounded-2xl shadow-2xl w-full max-w-md"
    x-transition.scale.origin.bottom.duration.300ms
  >
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-medium text-accent">Add New Link</h3>
      <button
        @click="isLinkModalOpen = false"
        class="text-tertiary hover:text-accent transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-accent/80 mb-1"
          >Select Group</label
        >
        <div class="relative">
          <select
            x-model="newLink.groupName"
            class="w-full bg-secondary border border-tertiary rounded-lg px-4 py-2 text-accent appearance-none focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all cursor-pointer"
          >
            <template x-for="group in groups" :key="group.groupName">
              <option
                :value="group.groupName"
                x-text="group.groupName"
              ></option>
            </template>
          </select>
          <div
            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-accent/70"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-4 h-4"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.5 8.25l-7.5 7.5-7.5-7.5"
              />
            </svg>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-accent/80 mb-1"
          >Link Name</label
        >
        <input
          x-model="newLink.name"
          type="text"
          placeholder="e.g. Google"
          class="w-full bg-secondary border border-tertiary rounded-lg px-4 py-2 text-accent placeholder-accent/40 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-accent/80 mb-1">URL</label>
        <input
          x-model="newLink.url"
          type="text"
          placeholder="google.com"
          class="w-full bg-secondary border border-tertiary rounded-lg px-4 py-2 text-accent placeholder-accent/40 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all"
        />
      </div>

      <button
        @click="saveLink()"
        class="w-full mt-4 bg-accent hover:bg-accent/80 text-primary font-bold py-2.5 rounded-lg transition-colors shadow-md shadow-black/20"
      >
        Save Link
      </button>
    </div>
  </div>
</div>
<div
  x-show="isSettingsModalOpen"
  style="display: none"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  x-transition.opacity.duration.300ms
>
  <div
    @click.away="isSettingsModalOpen = false"
    class="bg-primary border border-tertiary p-8 rounded-2xl shadow-2xl w-full max-w-sm"
    x-transition.scale.origin.bottom.duration.300ms
  >
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-xl font-medium text-accent">Settings</h3>
      <button
        @click="isSettingsModalOpen = false"
        class="text-tertiary hover:text-accent transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-accent/80 mb-2"
          >Custom Background Image</label
        >

        <input
          type="file"
          accept="image/*"
          @change="handleImageUpload($event)"
          class="block w-full text-sm text-accent/70 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-secondary file:text-accent hover:file:bg-tertiary cursor-pointer transition-all"
        />

        <p class="text-xs text-accent/50 mt-2">
          Upload any image file. It will be saved locally in your browser.
        </p>
      </div>

      <hr class="border-tertiary/30" />

      <button
        @click="resetBackground()"
        class="w-full bg-red-900/30 hover:bg-red-900/60 text-red-200 border border-red-900/50 font-medium py-2 rounded-lg transition-colors text-sm"
      >
        Reset to Default Image
      </button>
    </div>
  </div>
</div>
